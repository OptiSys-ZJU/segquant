baseline:
  default:
    enable: true
    seglinear: false
    search_patterns: []
    real_quant: true
    opt:
      type: "default"
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"  

ptq4dit:
  default:
    enable: true
    seglinear: false
    search_patterns: []
    real_quant: false
    opt:
      type: "smooth"
      alpha: 0.5
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"

segquant-amax:
  default:
    enable: true
    seglinear: true
    search_patterns: ["linear_to_chunk", "linear_to_split", "concat_to_linear", "stack_to_linear", "activation_to_linear"]
    real_quant: true
    opt:
      type: "smooth"
      alpha: 0.5
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"

segquant-gptq:
  default:
    enable: true
    seglinear: true
    search_patterns: ["linear_to_chunk", "linear_to_split", "concat_to_linear", "stack_to_linear", "activation_to_linear"]
    real_quant: true
    opt:
      type: "smooth"
      alpha: 0.5
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "gptq"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"

segquant-givens:
  default:
    enable: false
  transformer_blocks.1.attn.to_out.0:
    enable: true
    seglinear: false
    search_patterns: []
    real_quant: false
    opt:
      type: "givens"
      sub_optimizer_type: "smooth"
      sub_optimizer_kwargs:
        alpha: 0.5
        search_alpha_config:
          enable: false
          min: 0.0
          max: 1.0
          step: 0.1
        verbose: true
      verbose: true
      optim_type: "AdamW"
      optim_config:
        lr: !!float 5e-3
        weight_decay: !!float 1e-5
      givens_num: 768
      sample_mode: "custom"
      init_vecs_mode: "identity"
      enable_autograd: false
      enable_grad_buffer: false
      enable_low_memory_grad: false
      cpu_storage: false
      stop_criteria:
        max_steps: 2000
        grad_tol: !!float 1e-5
        grad_diff_rel: !!float 5e-3
        patience: 5
        ema_decay: 0.9
        check_every: 1
      mini_batch_size: 32
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"