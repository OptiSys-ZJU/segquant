wo-smooth-seg:
  default:
    enable: false
    seglinear: true
    search_patterns: []
  dummy_linear:
    enable: true
    real_quant: false
    opt:
      type: "smooth"
      alpha: 0.5
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8" 

w-smooth-seg:
  default:
    enable: false
    seglinear: true
    search_patterns: ["linear_to_chunk", "linear_to_split", "concat_to_linear", "stack_to_linear", "reshape_to_linear"]
  dummy_linear:
    enable: true
    real_quant: false
    opt:
      type: "smooth"
      alpha: 0.5
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "amax"
    input_quant:
      type: "int8"
    weight_quant:
      type: "int8"

wo-svd-seg:
  default:
    enable: false
    seglinear: true
    search_patterns: []
  dummy_linear:
    enable: true
    real_quant: false
    opt:
      type: "svd"
      alpha: 0.5
      low_rank: 64
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "gptq"
    input_quant:
      type: "int8"
      axis: -1
    weight_quant:
      type: "int4"
      axis: 1

w-svd-seg:
  default:
    enable: false
    seglinear: true
    search_patterns: ["linear_to_chunk", "linear_to_split", "concat_to_linear", "stack_to_linear", "reshape_to_linear"]
  dummy_linear:
    enable: true
    real_quant: false
    opt:
      type: "svd"
      alpha: 0.5
      low_rank: 64
      search_alpha_config:
        enable: true
        min: 0.0
        max: 1.0
        step: 0.1
      verbose: true
    calib:
      type: "gptq"
    input_quant:
      type: "int8"
      axis: -1
    weight_quant:
      type: "int4"
      axis: 1